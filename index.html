<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DBT Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body x-data="app()" x-init="init()">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">DBT Dashboard</div>
    <ul class="sidebar-nav">
      <li :class="{ active: view === 'personal' }" @click="view = 'personal'; drillAthlete = null">Personal</li>
      <li :class="{ active: view === 'coach' }" @click="view = 'coach'; drillAthlete = null">Coach</li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <!-- Personal View -->
    <div x-show="view === 'personal'" x-cloak>
      <template x-if="me">
        <div>

          <!-- Header -->
          <div class="section-header">
            <div>
              <h1 class="page-title" x-text="me.name"></h1>
              <span class="last-updated" x-text="data ? 'Updated ' + data.generated_at.replace('T', ' ').slice(0, 16) + ' UTC' : ''"></span>
            </div>
            <button class="btn-refresh" @click="refresh()" :disabled="refreshing">
              <span x-text="refreshing ? 'Refreshing…' : '⟳ Refresh'"></span>
            </button>
          </div>

          <!-- Metric Cards: CTL, ATL, TSB, Status -->
          <div class="cards-grid">
            <div class="card">
              <div class="card-label">CTL (Fitness)</div>
              <div class="card-value" x-text="me.current_fitness.ctl.toFixed(1)"></div>
              <div class="card-hint">42-day training load. Higher = fitter base.</div>
            </div>
            <div class="card">
              <div class="card-label">ATL (Fatigue)</div>
              <div class="card-value" x-text="me.current_fitness.atl.toFixed(1)"></div>
              <div class="card-hint">7-day training load. How tired you are right now.</div>
            </div>
            <div class="card">
              <div class="card-label">TSB (Form)</div>
              <div class="card-value" x-text="me.current_fitness.tsb.toFixed(1)"></div>
              <div class="card-hint">CTL minus ATL. Positive = fresh, negative = fatigued.</div>
            </div>
            <div class="card">
              <div class="card-label">Status</div>
              <div class="card-value">
                <span class="badge"
                  :class="'badge-' + tsbStatus(me.current_fitness.tsb).cssClass"
                  x-text="tsbStatus(me.current_fitness.tsb).label">
                </span>
              </div>
              <div class="card-hint" x-text="tsbStatusHint(me.current_fitness.tsb)"></div>
            </div>
          </div>

          <!-- Week Summary Bar -->
          <div class="section week-summary-bar">
            <div class="week-stat">
              <span class="week-stat-value" x-text="me.this_week.total_hours ? me.this_week.total_hours.toFixed(1) + 'h' : '—'"></span>
              <span class="week-stat-label">Hours (This Week)</span>
            </div>
            <div class="week-stat">
              <span class="week-stat-value" x-text="me.this_week.total_tss || '—'"></span>
              <span class="week-stat-label">Total TSS</span>
            </div>
            <div class="week-stat">
              <span class="week-stat-value">
                <span x-text="me.this_week.sessions_completed"></span>/<span x-text="me.this_week.sessions_planned"></span>
              </span>
              <span class="week-stat-label">Sessions</span>
            </div>
            <div class="week-stat">
              <span class="week-stat-value" :class="weeklyRampRate() > 10 ? 'text-warning' : weeklyRampRate() < -10 ? 'text-muted' : ''"
                x-text="(weeklyRampRate() > 0 ? '+' : '') + weeklyRampRate() + '%'"></span>
              <span class="week-stat-label">Load vs Last Week</span>
            </div>
          </div>

          <!-- Recovery Panel (Sleep + HRV) -->
          <div class="section" x-show="me.recovery && me.recovery.length > 0">
            <h2 class="section-title">Recovery</h2>
            <div class="recovery-grid">
              <!-- Sleep card -->
              <div class="recovery-card">
                <div class="recovery-card-header">
                  <span class="recovery-icon">&#128564;</span>
                  <span class="recovery-card-title">Sleep</span>
                </div>
                <div class="recovery-big-number" x-text="me.recovery.length > 0 ? me.recovery[me.recovery.length - 1].sleep_hours.toFixed(1) + 'h' : '—'"></div>
                <div class="recovery-label">Last Night</div>
                <div class="recovery-avg">
                  Avg 7d: <strong x-text="me.recovery.length > 0 ? (me.recovery.reduce(function(a,b){ return a + b.sleep_hours; }, 0) / me.recovery.length).toFixed(1) + 'h' : '—'"></strong>
                </div>
              </div>
              <!-- HRV card -->
              <div class="recovery-card">
                <div class="recovery-card-header">
                  <span class="recovery-icon">&#128147;</span>
                  <span class="recovery-card-title">HRV</span>
                </div>
                <div class="recovery-big-number" x-text="me.recovery.length > 0 ? me.recovery[me.recovery.length - 1].hrv : '—'"></div>
                <div class="recovery-label">This Morning</div>
                <div class="recovery-avg">
                  Avg 7d: <strong x-text="me.recovery.length > 0 ? Math.round(me.recovery.reduce(function(a,b){ return a + b.hrv; }, 0) / me.recovery.length) : '—'"></strong>
                </div>
              </div>
              <!-- Resting HR card -->
              <div class="recovery-card">
                <div class="recovery-card-header">
                  <span class="recovery-icon">&#10084;&#65039;</span>
                  <span class="recovery-card-title">Resting HR</span>
                </div>
                <div class="recovery-big-number" x-text="me.recovery.length > 0 ? me.recovery[me.recovery.length - 1].resting_hr + ' bpm' : '—'"></div>
                <div class="recovery-label">This Morning</div>
                <div class="recovery-avg">
                  Avg 7d: <strong x-text="me.recovery.length > 0 ? Math.round(me.recovery.reduce(function(a,b){ return a + b.resting_hr; }, 0) / me.recovery.length) + ' bpm' : '—'"></strong>
                </div>
              </div>
            </div>
            <!-- Sleep + HRV trend chart -->
            <div class="recovery-chart-container">
              <canvas id="recoveryChart"></canvas>
            </div>
            <!-- Sleep breakdown for last night -->
            <div class="sleep-breakdown" x-show="me.recovery.length > 0">
              <h3 class="sleep-breakdown-title">Last Night's Sleep Breakdown</h3>
              <div class="sleep-stage">
                <div class="sleep-stage-bar deep" :style="'width:' + (me.recovery[me.recovery.length-1].deep / me.recovery[me.recovery.length-1].sleep_hours * 100) + '%'"></div>
                <span class="sleep-stage-label">Deep <strong x-text="me.recovery[me.recovery.length-1].deep.toFixed(1) + 'h'"></strong></span>
              </div>
              <div class="sleep-stage">
                <div class="sleep-stage-bar light" :style="'width:' + (me.recovery[me.recovery.length-1].light / me.recovery[me.recovery.length-1].sleep_hours * 100) + '%'"></div>
                <span class="sleep-stage-label">Light <strong x-text="me.recovery[me.recovery.length-1].light.toFixed(1) + 'h'"></strong></span>
              </div>
              <div class="sleep-stage">
                <div class="sleep-stage-bar rem" :style="'width:' + (me.recovery[me.recovery.length-1].rem / me.recovery[me.recovery.length-1].sleep_hours * 100) + '%'"></div>
                <span class="sleep-stage-label">REM <strong x-text="me.recovery[me.recovery.length-1].rem.toFixed(1) + 'h'"></strong></span>
              </div>
              <div class="sleep-stage">
                <div class="sleep-stage-bar awake" :style="'width:' + Math.max(3, (me.recovery[me.recovery.length-1].awake / me.recovery[me.recovery.length-1].sleep_hours * 100)) + '%'"></div>
                <span class="sleep-stage-label">Awake <strong x-text="me.recovery[me.recovery.length-1].awake.toFixed(1) + 'h'"></strong></span>
              </div>
            </div>
          </div>

          <!-- AI Coach Summary -->
          <div class="section ai-summary" x-show="me.coach_summary">
            <div class="ai-summary-header">
              <span class="ai-icon">&#129302;</span>
              <h2 class="section-title" style="margin-bottom:0">Coach Analysis</h2>
            </div>
            <p class="ai-summary-text" x-text="me.coach_summary"></p>

            <!-- Ask Coach AI -->
            <div class="coach-chat">
              <div class="coach-chat-header">Ask Coach AI</div>
              <div class="coach-quick-asks">
                <button class="quick-ask" @click="askCoach('Am I ready for a long ride this weekend?')">Ready for long ride?</button>
                <button class="quick-ask" @click="askCoach('Should I rest tomorrow or train?')">Rest or train tomorrow?</button>
                <button class="quick-ask" @click="askCoach('How is my recovery trending?')">Recovery trend?</button>
                <button class="quick-ask" @click="askCoach('What pace should I target for my next half marathon?')">HM pace target?</button>
              </div>
              <div class="coach-input-row">
                <input type="text" class="coach-input" placeholder="Ask anything about your training..."
                  x-model="coachQuestion"
                  @keydown.enter="askCoach(coachQuestion)">
                <button class="coach-send" @click="askCoach(coachQuestion)" :disabled="coachLoading">
                  <span x-show="!coachLoading">&#10148;</span>
                  <span x-show="coachLoading">...</span>
                </button>
              </div>
              <div class="coach-messages" x-show="coachMessages.length > 0">
                <template x-for="msg in coachMessages" :key="msg.id">
                  <div class="coach-msg" :class="'coach-msg--' + msg.role">
                    <div class="coach-msg-text" x-text="msg.text"></div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Fitness Trend Chart -->
          <div class="section">
            <div class="section-header-row">
              <h2 class="section-title">Fitness Trend</h2>
              <div class="range-toggles">
                <button :class="{ active: fitnessRange === '90d' }" @click="fitnessRange = '90d'">90d</button>
                <button :class="{ active: fitnessRange === '6m' }"  @click="fitnessRange = '6m'">6m</button>
                <button :class="{ active: fitnessRange === '1y' }"  @click="fitnessRange = '1y'">1y</button>
              </div>
            </div>
            <div class="chart-container">
              <canvas id="fitnessChart"></canvas>
            </div>
          </div>

          <!-- Volume + Sport Donut -->
          <div class="charts-grid">
            <div class="section">
              <h2 class="section-title">Weekly Volume</h2>
              <div class="chart-container">
                <canvas id="volumeChart"></canvas>
              </div>
            </div>
            <div class="section">
              <div class="section-header-row">
                <h2 class="section-title">Sport Mix</h2>
                <div class="range-toggles">
                  <button :class="{ active: sportMixView === 'this' }" @click="sportMixView = 'this'; renderSportChart()">This Week</button>
                  <button :class="{ active: sportMixView === 'last' }" @click="sportMixView = 'last'; renderSportChart()">Last Week</button>
                </div>
              </div>
              <div class="chart-container chart-container--donut">
                <canvas id="sportChart"></canvas>
              </div>
            </div>
          </div>

          <!-- This Week + Last Week Summary -->
          <div class="charts-grid">
            <div class="section">
              <h2 class="section-title">This Week</h2>
              <div class="week-summary-inline">
                <div class="week-stat-inline">
                  <span class="week-stat-value-sm" x-text="me.this_week.total_hours ? me.this_week.total_hours.toFixed(1) + 'h' : '0h'"></span>
                  <span class="week-stat-label-sm">Hours</span>
                </div>
                <div class="week-stat-inline">
                  <span class="week-stat-value-sm" x-text="me.this_week.total_tss || 0"></span>
                  <span class="week-stat-label-sm">TSS</span>
                </div>
                <div class="week-stat-inline">
                  <span class="week-stat-value-sm">
                    <span x-text="me.this_week.sessions_completed"></span>/<span x-text="me.this_week.sessions_planned"></span>
                  </span>
                  <span class="week-stat-label-sm">Sessions</span>
                </div>
                <div class="week-stat-inline">
                  <span class="week-stat-value-sm" :class="'compliance-' + complianceClass(me.this_week.compliance_pct)" x-text="me.this_week.compliance_pct + '%'"></span>
                  <span class="week-stat-label-sm">Compliance</span>
                </div>
              </div>
            </div>
            <div class="section" x-show="me.last_week">
              <h2 class="section-title">Last Week</h2>
              <template x-if="me.last_week">
                <div class="week-summary-inline">
                  <div class="week-stat-inline">
                    <span class="week-stat-value-sm" x-text="me.last_week.total_hours ? me.last_week.total_hours.toFixed(1) + 'h' : '0h'"></span>
                    <span class="week-stat-label-sm">Hours</span>
                  </div>
                  <div class="week-stat-inline">
                    <span class="week-stat-value-sm" x-text="me.last_week.total_tss || 0"></span>
                    <span class="week-stat-label-sm">TSS</span>
                  </div>
                  <div class="week-stat-inline">
                    <span class="week-stat-value-sm">
                      <span x-text="me.last_week.sessions_completed"></span>/<span x-text="me.last_week.sessions_planned"></span>
                    </span>
                    <span class="week-stat-label-sm">Sessions</span>
                  </div>
                  <div class="week-stat-inline">
                    <span class="week-stat-value-sm" :class="'compliance-' + complianceClass(me.last_week.compliance_pct)" x-text="me.last_week.compliance_pct + '%'"></span>
                    <span class="week-stat-label-sm">Compliance</span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- This Week (Mon-Sun, completed + upcoming merged) -->
          <div class="section">
            <h2 class="section-title">
              This Week
              <span class="compliance-badge" :class="'compliance-' + complianceClass(me.this_week.compliance_pct)">
                <span x-text="me.this_week.sessions_completed"></span>/<span x-text="me.this_week.sessions_planned"></span>
                &nbsp;(<span x-text="me.this_week.compliance_pct"></span>%)
              </span>
            </h2>
            <table class="sessions-table">
              <thead>
                <tr>
                  <th></th>
                  <th>Day</th>
                  <th>Session</th>
                  <th>Sport</th>
                  <th>Duration</th>
                  <th>TSS</th>
                  <th>Distance</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="s in thisWeekSessions()" :key="s.date + s.title + s._status">
                  <tr :class="{ 'row-upcoming': s._status === 'upcoming', 'row-missed': s._status === 'missed' }">
                    <td x-text="s._status === 'done' ? '✅' : s._status === 'missed' ? '❌' : '⏳'"></td>
                    <td x-text="formatDate(s.date)"></td>
                    <td x-text="s.title + (s._status === 'missed' ? ' (missed)' : '')"></td>
                    <td><span class="sport-tag" :class="'sport-' + sportClass(s.sport)" x-text="s.sport"></span></td>
                    <td x-text="s._status === 'done' ? formatHours(s.duration_hours) : formatHours(s.duration_hours || s.duration_planned)"></td>
                    <td x-text="s._status === 'done' ? s.tss : (s.tss_planned ? s.tss_planned + ' (plan)' : '—')"></td>
                    <td x-text="s.distance_km ? s.distance_km + ' km' : '—'"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <!-- Last Week -->
          <div class="section" x-show="me.last_week && me.last_week.sessions">
            <h2 class="section-title">
              Last Week
              <template x-if="me.last_week">
                <span class="compliance-badge" :class="'compliance-' + complianceClass(me.last_week.compliance_pct)">
                  <span x-text="me.last_week.sessions_completed"></span>/<span x-text="me.last_week.sessions_planned"></span>
                  &nbsp;(<span x-text="me.last_week.compliance_pct"></span>%)
                </span>
              </template>
            </h2>
            <template x-if="me.last_week && me.last_week.sessions">
              <table class="sessions-table">
                <thead>
                  <tr>
                    <th></th>
                    <th>Day</th>
                    <th>Session</th>
                    <th>Sport</th>
                    <th>Duration</th>
                    <th>TSS</th>
                    <th>Distance</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="s in me.last_week.sessions" :key="s.date + s.title + s._status">
                    <tr :class="{ 'row-missed': s._status === 'missed' }">
                      <td x-text="s._status === 'missed' ? '❌' : '✅'"></td>
                      <td x-text="formatDate(s.date)"></td>
                      <td x-text="s.title + (s._status === 'missed' ? ' (missed)' : '')"></td>
                      <td><span class="sport-tag" :class="'sport-' + sportClass(s.sport)" x-text="s.sport"></span></td>
                      <td x-text="s._status === 'missed' ? '—' : formatHours(s.duration_hours)"></td>
                      <td x-text="s._status === 'missed' ? '—' : s.tss"></td>
                      <td x-text="s.distance_km ? s.distance_km + ' km' : '—'"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </template>
          </div>

          <!-- Race Countdown -->
          <div class="charts-grid">
            <div class="section">
              <h2 class="section-title">Race Countdown</h2>
              <template x-if="me.focus_event">
                <div class="race-countdown">
                  <div class="race-name" x-text="me.focus_event.name"></div>
                  <div class="race-date" x-text="me.focus_event.date"></div>
                  <div class="race-days">
                    <span class="days-big" x-text="me.focus_event.days_out"></span>
                    <span class="days-label"> days out</span>
                  </div>
                  <template x-if="me.focus_event.ctl_target">
                    <div class="ctl-progress">
                      <div class="ctl-progress-labels">
                        <span>CTL <span x-text="me.focus_event.ctl_current.toFixed(1)"></span></span>
                        <span>Target <span x-text="me.focus_event.ctl_target"></span></span>
                      </div>
                      <div class="progress-bar">
                        <div class="progress-fill"
                          :class="'rag-' + raceRag(me.focus_event.ctl_current, me.focus_event.ctl_target, me.focus_event.days_out)"
                          :style="'width: ' + Math.min(100, Math.round(me.focus_event.ctl_current / me.focus_event.ctl_target * 100)) + '%'">
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="me.next_event && !me.focus_event">
                <div class="race-countdown">
                  <div class="race-name" x-text="me.next_event.name"></div>
                  <div class="race-date" x-text="me.next_event.date"></div>
                  <div class="race-days">
                    <span class="days-big" x-text="me.next_event.days_out"></span>
                    <span class="days-label"> days out</span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Personal Records -->
          <div class="section">
            <h2 class="section-title">Personal Records</h2>

            <!-- Running PBs -->
            <h3 class="pb-category-title">&#127939; Running</h3>
            <div class="pb-grid">
              <template x-for="pb in (me.pbs && me.pbs.run ? me.pbs.run : [])" :key="pb.distance">
                <div class="pb-card">
                  <div class="pb-distance" x-text="pb.distance"></div>
                  <div class="pb-time" x-text="pb.time"></div>
                  <div class="pb-pace" x-text="pb.pace"></div>
                  <div class="pb-date" x-text="formatDate(pb.date)"></div>
                </div>
              </template>
            </div>

            <!-- Bike PBs -->
            <h3 class="pb-category-title">&#128692; Cycling</h3>
            <div class="pb-grid">
              <template x-for="pb in (me.pbs && me.pbs.bike ? me.pbs.bike : [])" :key="pb.metric">
                <div class="pb-card">
                  <div class="pb-distance" x-text="pb.metric"></div>
                  <div class="pb-time" x-text="pb.value"></div>
                  <div class="pb-date" x-text="formatDate(pb.date)"></div>
                </div>
              </template>
            </div>

            <!-- All-Time Stats -->
            <h3 class="pb-category-title">&#128200; All-Time</h3>
            <div class="alltime-grid" x-show="me.alltime_stats">
              <template x-if="me.alltime_stats">
                <template x-for="stat in me.alltime_stats" :key="stat.label">
                  <div class="alltime-stat">
                    <div class="alltime-value" x-text="stat.value"></div>
                    <div class="alltime-label" x-text="stat.label"></div>
                  </div>
                </template>
              </template>
            </div>
          </div>

          <!-- Race History -->
          <div class="section" x-show="me.race_history && me.race_history.length > 0">
            <h2 class="section-title">Race History</h2>
            <template x-for="year in raceYears()" :key="year">
              <div class="race-year-group">
                <div class="race-year-header" x-text="year"></div>
                <div class="race-history-grid">
                  <template x-for="race in racesForYear(year)" :key="race.date + race.name">
                    <div class="race-card" :class="{ 'race-card--pb': race.pb }">
                      <div class="race-card-header">
                        <div>
                          <div class="race-card-name" x-text="race.name"></div>
                          <div class="race-card-meta">
                            <span x-text="formatDate(race.date)"></span>
                            <span class="race-type-badge" :class="'race-type--' + race.type.toLowerCase().replace(/\s+/g, '')" x-text="race.type"></span>
                          </div>
                        </div>
                        <div class="race-card-total">
                          <div class="race-total-time" x-text="race.total"></div>
                          <div class="race-total-label" x-text="race.pb ? 'PB' : 'Total'"></div>
                        </div>
                      </div>
                      <div class="race-splits">
                        <div class="race-split">
                          <span class="race-split-icon" x-text="race.type === 'Duathlon' ? '&#127939;' : '&#127946;'"></span>
                          <span class="race-split-label" x-text="race.type === 'Duathlon' ? 'Run 1' : 'Swim'"></span>
                          <span class="race-split-dist" x-text="race.swim_dist"></span>
                          <span class="race-split-time" x-text="race.swim"></span>
                        </div>
                        <div class="race-split">
                          <span class="race-split-icon">&#128692;</span>
                          <span class="race-split-label">Bike</span>
                          <span class="race-split-dist" x-text="race.bike_dist"></span>
                          <span class="race-split-time" x-text="race.bike"></span>
                        </div>
                        <div class="race-split">
                          <span class="race-split-icon">&#127939;</span>
                          <span class="race-split-label" x-text="race.type === 'Duathlon' ? 'Run 2' : 'Run'"></span>
                          <span class="race-split-dist" x-text="race.run_dist"></span>
                          <span class="race-split-time" x-text="race.run"></span>
                        </div>
                      </div>
                      <div class="race-note" x-show="race.note" x-text="race.note"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>

        </div>
      </template>
      <template x-if="!me && !loading">
        <p class="loading-msg">No personal data available.</p>
      </template>
    </div>

    <!-- Coach View -->
    <div x-show="view === 'coach'" x-cloak>
      <div class="coach-subnav">
        <button class="coach-subnav-btn" :class="{ active: coachTab === 'triage' && !drillAthlete }" @click="coachTab = 'triage'; drillAthlete = null">Triage</button>
        <button class="coach-subnav-btn" :class="{ active: coachTab === 'week' && !drillAthlete }" @click="coachTab = 'week'; drillAthlete = null">Week View</button>
        <button class="coach-subnav-btn" :class="{ active: drillAthlete !== null }" :disabled="!drillAthlete">Athlete Detail</button>
      </div>

      <div x-show="coachTab === 'triage' && !drillAthlete">

      <!-- Header -->
      <div class="section-header">
        <div>
          <h1 class="page-title">Coach Dashboard</h1>
          <span class="last-updated">
            <span x-text="roster.length"></span> athletes
            <template x-if="data">
              &nbsp;· Updated <span x-text="data.generated_at.replace('T', ' ').slice(0, 16)"></span> UTC
            </template>
          </span>
        </div>
        <button class="btn-refresh" @click="refresh()" :disabled="refreshing">
          <span x-text="refreshing ? 'Refreshing…' : '⟳ Refresh'"></span>
        </button>
      </div>

      <!-- Summary Cards (Triage alerts) -->
      <div class="cards-grid">
        <div class="card card--red alert-card" @click="triageFilters.statusFilter = 'needs_checkin'"
             :class="{ 'alert-card--active': triageFilters.statusFilter === 'needs_checkin' }">
          <div class="card-label">🔴 Needs Check-In</div>
          <div class="card-value" x-text="rosterCounts.needsCheckin"></div>
        </div>
        <div class="card card--amber alert-card" @click="triageFilters.statusFilter = 'watch'"
             :class="{ 'alert-card--active': triageFilters.statusFilter === 'watch' }">
          <div class="card-label">🟠 Watch</div>
          <div class="card-value" x-text="rosterCounts.watch"></div>
        </div>
        <div class="card card--green alert-card" @click="triageFilters.statusFilter = 'on_track'"
             :class="{ 'alert-card--active': triageFilters.statusFilter === 'on_track' }">
          <div class="card-label">🟢 On Track</div>
          <div class="card-value" x-text="rosterCounts.onTrack"></div>
        </div>
        <div class="card">
          <div class="card-label">Avg Compliance</div>
          <div class="card-value"><span x-text="avgCompliance"></span>%</div>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <input type="text" class="filter-search" placeholder="Search athletes..." x-model="triageFilters.search">
        <div class="filter-chips">
          <span class="filter-label">Sport:</span>
          <template x-for="sport in ['run', 'bike', 'swim', 'other']" :key="sport">
            <button class="filter-chip" :class="{ 'active': triageFilters.sports.includes(sport) }"
                    @click="toggleSportFilter(sport)">
              <span x-text="sport === 'run' ? '🏃' : sport === 'bike' ? '🚴' : sport === 'swim' ? '🏊' : '•'"></span>
              <span x-text="sport.charAt(0).toUpperCase() + sport.slice(1)"></span>
            </button>
          </template>
        </div>
        <div class="filter-chips">
          <span class="filter-label">Flag:</span>
          <template x-for="flagType in ['missed_sessions', 'fatigue_risk', 'training_gap', 'mood_keyword', 'race_not_ready']" :key="flagType">
            <button class="filter-chip" :class="{ 'active': triageFilters.flagTypes.includes(flagType) }"
                    @click="toggleFlagFilter(flagType)">
              <span x-text="flagEmoji(flagType)"></span>
              <span x-text="flagLabel(flagType)"></span>
            </button>
          </template>
        </div>
        <button class="filter-clear" x-show="hasActiveFilters()" @click="clearTriageFilters()">
          ✕ Clear filters
        </button>
      </div>

      <!-- Roster Table -->
      <div class="section">
        <h2 class="section-title">Athlete Roster</h2>
        <table class="sessions-table roster-table">
          <thead>
            <tr>
              <th>Athlete</th>
              <th>Compliance</th>
              <th>Next Race</th>
              <th>Days</th>
              <th>Trend</th>
              <th>Flags</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="a in roster" :key="a.id">
              <tr class="roster-row" @click="drillAthlete = a.id" style="cursor:pointer">
                <td x-text="a.name"></td>
                <td>
                  <span class="compliance-badge" :class="'compliance-' + complianceClass(a.compliance_pct)">
                    <span x-text="a.compliance_pct"></span>%
                  </span>
                </td>
                <td x-text="a.next_event ? a.next_event : '—'"></td>
                <td x-text="a.days_to_event != null ? a.days_to_event : '—'"></td>
                <td x-html="a.weekly_tss_trend ? sparklineSvg(a.weekly_tss_trend, 80, 24) : ''"></td>
                <td>
                  <template x-if="a.flags && a.flags.length > 0">
                    <span>
                      <template x-for="f in a.flags" :key="f">
                        <span :title="f" x-text="flagEmoji(f)"></span>
                      </template>
                    </span>
                  </template>
                  <template x-if="!a.flags || a.flags.length === 0">
                    <span class="text-muted">—</span>
                  </template>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Compliance Heatmap -->
      <div class="section">
        <h2 class="section-title">Weekly Heatmap</h2>
        <div class="heatmap-container">
          <table class="heatmap-table">
            <thead>
              <tr>
                <th class="heatmap-name-col">Athlete</th>
                <template x-if="heatmapData().length > 0 && heatmapData()[0].days.length > 0">
                  <template x-for="day in heatmapData()[0].days" :key="day.date">
                    <th x-text="formatDay(day.date)"></th>
                  </template>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="row in heatmapData()" :key="row.name">
                <tr>
                  <td class="heatmap-name-col" x-text="row.name"></td>
                  <template x-for="day in row.days" :key="day.date">
                    <td class="heatmap-cell" :title="day.date" x-text="heatmapIcon(day.status)"></td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Upcoming Races -->
      <div class="section">
        <h2 class="section-title">Upcoming Races</h2>
        <ul class="upcoming-list">
          <template x-for="a in roster.filter(r => r.next_event && r.days_to_event != null).sort((x,y) => x.days_to_event - y.days_to_event)" :key="a.id">
            <li class="upcoming-item">
              <span class="upcoming-day" x-text="a.days_to_event + 'd'"></span>
              <span class="upcoming-session">
                <strong x-text="a.name"></strong>
                &nbsp;—&nbsp;
                <span x-text="a.next_event"></span>
              </span>
            </li>
          </template>
          <template x-if="roster.filter(r => r.next_event && r.days_to_event != null).length === 0">
            <li class="text-muted">No upcoming races scheduled.</li>
          </template>
        </ul>
      </div>

      </div>

      <div x-show="coachTab === 'week' && !drillAthlete">
        <p class="text-muted">Week View coming next.</p>
      </div>

    <!-- Athlete Drill-down -->
    <div x-show="view === 'coach' && drillAthlete" x-cloak>
      <template x-if="activeAthlete">
        <div>

          <!-- Header -->
          <div class="section-header">
            <div>
              <button class="btn-back" @click="drillAthlete = null">← Back to Roster</button>
              <h1 class="page-title" x-text="activeAthlete.name"></h1>
            </div>
          </div>

          <!-- Metric Cards -->
          <div class="cards-grid">
            <div class="card">
              <div class="card-label">CTL (Fitness)</div>
              <div class="card-value" x-text="activeAthlete.current_fitness.ctl.toFixed(1)"></div>
            </div>
            <div class="card">
              <div class="card-label">ATL (Fatigue)</div>
              <div class="card-value" x-text="activeAthlete.current_fitness.atl.toFixed(1)"></div>
            </div>
            <div class="card">
              <div class="card-label">TSB (Form)</div>
              <div class="card-value" x-text="activeAthlete.current_fitness.tsb.toFixed(1)"></div>
            </div>
            <div class="card">
              <div class="card-label">Status</div>
              <div class="card-value">
                <span class="badge"
                  :class="'badge-' + tsbStatus(activeAthlete.current_fitness.tsb).cssClass"
                  x-text="tsbStatus(activeAthlete.current_fitness.tsb).label">
                </span>
              </div>
            </div>
          </div>

          <!-- Sessions Table -->
          <div class="section">
            <h2 class="section-title">
              This Week
              <template x-if="activeAthlete.this_week">
                <span class="compliance-badge" :class="'compliance-' + complianceClass(activeAthlete.this_week.compliance_pct)">
                  <span x-text="activeAthlete.this_week.sessions_completed"></span>/<span x-text="activeAthlete.this_week.sessions_planned"></span>
                  &nbsp;(<span x-text="activeAthlete.this_week.compliance_pct"></span>%)
                </span>
              </template>
            </h2>
            <table class="sessions-table">
              <thead>
                <tr>
                  <th></th>
                  <th>Day</th>
                  <th>Session</th>
                  <th>Sport</th>
                  <th>Duration</th>
                  <th>TSS</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="s in (activeAthlete.completed_sessions || [])" :key="s.date + s.title">
                  <tr>
                    <td>✅</td>
                    <td x-text="formatDay(s.date)"></td>
                    <td x-text="s.title"></td>
                    <td><span class="sport-tag" :class="'sport-' + sportClass(s.sport)" x-text="s.sport"></span></td>
                    <td x-text="formatHours(s.duration_hours)"></td>
                    <td x-text="s.tss"></td>
                  </tr>
                </template>
                <template x-if="activeAthlete.missed_sessions && activeAthlete.missed_sessions.length > 0">
                  <template x-for="s in activeAthlete.missed_sessions" :key="s.date + s.title">
                    <tr class="row-missed">
                      <td>❌</td>
                      <td x-text="formatDay(s.date)"></td>
                      <td x-text="s.title"></td>
                      <td><span class="sport-tag" :class="'sport-' + sportClass(s.sport)" x-text="s.sport"></span></td>
                      <td>—</td>
                      <td>—</td>
                    </tr>
                  </template>
                </template>
                <template x-for="s in (activeAthlete.upcoming_sessions || [])" :key="s.date + s.title">
                  <tr class="row-upcoming">
                    <td>⏳</td>
                    <td x-text="formatDay(s.date)"></td>
                    <td x-text="s.title"></td>
                    <td><span class="sport-tag" :class="'sport-' + sportClass(s.sport)" x-text="s.sport"></span></td>
                    <td x-text="formatHours(s.duration_hours)"></td>
                    <td x-text="s.tss_planned ? s.tss_planned + ' (plan)' : '—'"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>

          <!-- Race Countdown -->
          <div class="section">
            <h2 class="section-title">Race Countdown</h2>
            <template x-if="activeAthlete.focus_event">
              <div class="race-countdown">
                <div class="race-name" x-text="activeAthlete.focus_event.name"></div>
                <div class="race-date" x-text="activeAthlete.focus_event.date"></div>
                <div class="race-days">
                  <span class="days-big" x-text="activeAthlete.focus_event.days_out"></span>
                  <span class="days-label"> days out</span>
                </div>
                <template x-if="activeAthlete.focus_event.ctl_target">
                  <div class="ctl-progress">
                    <div class="ctl-progress-labels">
                      <span>CTL <span x-text="activeAthlete.focus_event.ctl_current.toFixed(1)"></span></span>
                      <span>Target <span x-text="activeAthlete.focus_event.ctl_target"></span></span>
                    </div>
                    <div class="progress-bar">
                      <div class="progress-fill"
                        :class="'rag-' + raceRag(activeAthlete.focus_event.ctl_current, activeAthlete.focus_event.ctl_target, activeAthlete.focus_event.days_out)"
                        :style="'width: ' + Math.min(100, Math.round(activeAthlete.focus_event.ctl_current / activeAthlete.focus_event.ctl_target * 100)) + '%'">
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="activeAthlete.next_event && !activeAthlete.focus_event">
              <div class="race-countdown">
                <div class="race-name" x-text="activeAthlete.next_event.name"></div>
                <div class="race-date" x-text="activeAthlete.next_event.date"></div>
                <div class="race-days">
                  <span class="days-big" x-text="activeAthlete.next_event.days_out"></span>
                  <span class="days-label"> days out</span>
                </div>
              </div>
            </template>
            <template x-if="!activeAthlete.focus_event && !activeAthlete.next_event">
              <p class="text-muted">No upcoming events.</p>
            </template>
          </div>

        </div>
      </template>
    </div>
    </div>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
