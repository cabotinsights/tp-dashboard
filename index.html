<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TP Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body x-data="app()" x-init="init()">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">TP Dashboard</div>
    <ul class="sidebar-nav">
      <li :class="{ active: view === 'personal' }" @click="view = 'personal'; drillAthlete = null">Personal</li>
      <li :class="{ active: view === 'coach' }" @click="view = 'coach'; drillAthlete = null">Coach</li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <!-- Personal View placeholder -->
    <div x-show="view === 'personal'" x-cloak>
      <p>Personal view loading...</p>
    </div>

    <!-- Coach View placeholder -->
    <div x-show="view === 'coach' && !drillAthlete" x-cloak>
      <p>Coach view loading...</p>
    </div>

    <!-- Athlete Drill-down placeholder -->
    <div x-show="view === 'coach' && drillAthlete" x-cloak>
      <p>Athlete detail loading...</p>
    </div>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
